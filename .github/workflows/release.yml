name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" Info.plist

      - name: Build release binary
        run: swift build -c release

      - name: Assemble app bundle
        run: |
          mkdir -p Rescale.app/Contents/MacOS
          mkdir -p Rescale.app/Contents/Resources
          cp .build/release/Rescale Rescale.app/Contents/MacOS/Rescale
          cp Info.plist Rescale.app/Contents/
          cp Sources/Rescale/Resources/AppIcon.icns Rescale.app/Contents/Resources/
          cp -R .build/release/Rescale_Rescale.bundle Rescale.app/Contents/MacOS/

      - name: Zip app bundle
        run: zip -r Rescale.zip Rescale.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Rescale.zip
          body: |
            ## Install

            1. Download **Rescale.zip** below
            2. Unzip and move **Rescale.app** to your Applications folder
            3. Open Terminal and run: `xattr -cr /Applications/Rescale.app`
            4. Double-click to launch

            Step 3 removes the macOS quarantine flag on unsigned apps. Only needed once per download.

            **Updating?** Replace the old Rescale.app in Applications with the new one and re-run the `xattr` command.

            Rescale appears as a scale-arrows icon in your menu bar — click it to switch display scaling.
          generate_release_notes: true
